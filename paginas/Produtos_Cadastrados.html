<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="shortcut icon" href="/imagens/carrinho_icone_site.png" type="image/x-icon">
    <!-- favecon.ico: Para colocar logo na aba da página -->
    <link rel="stylesheet" href="/css/estrutura_pagina.css">
    <link rel="stylesheet" href="/css/listagem.css">
    <link rel="stylesheet" href="/css/botoes.css">

    <script src="/js/produtos.js" defer></script>

</head>

<body>

    <div class="menu">
        <a href="Cadastro.html" class="btn-menu"> Cadastrar Produto</a>

    </div>

     <!-- Caixa onde os produtos serão exibidos -->
    <div class="caixa">
        <!-- Link para voltar para a página principal -->
        <a href="/index.html" class="link-pagina">🡠 Voltar para a tela inicial</a>

        <h2>Produtos Cadastrados</h2>

        <!-- Campo utilizado para pesquisar produtos -->

        <input
    class="pesquisa"
    type="text"
    id="pesquisa"
    placeholder="Pesquisar produto..."
    onkeyup="mostrarNaTela()"
    >

         <!-- Lista onde os produtos serão mostrados pelo JavaScript -->

        <ul id="lista">

        </ul>
        
    </div>

</body>

</html>
